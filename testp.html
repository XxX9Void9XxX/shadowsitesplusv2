<!DOCTYPE html>
<html>
<head>
  <title>Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* removes scrollbars */
      background: black; /* prevents white flash edges */
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="myFrame" src="https://fffsssffss.vercel.app/a/hvtrs8%2F-wuw%2Cbpousgrnilg%2Ccmm-bpousg%2Fuil12%2Fahpooe33%3A%2Fjtvpq%3A-%2Feomgne%2Ccmm"></iframe>

<script>
  const iframe = document.getElementById("myFrame");

  setInterval(() => {
    iframe.src = iframe.src;
  }, 185000); // 3 minutes 5 seconds
</script>

</body>
</html>
